{{ define "main" }}
<section class="about container">
  <div class="about-hero">
    <div class="about-hero__info">
      <h1 class="about-hero__name">Get in Touch</h1>
      <p class="about-hero__role">Recruiting, collaborating, or just want to say hi?</p>
      <p class="about-hero__tagline">Drop a message below, or reach me directly.</p>
      <div class="about-hero__links">
        {{ with .Site.Params.social.linkedin }}
        <a href="{{ . }}" target="_blank" rel="noopener noreferrer" class="about-hero__link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>
        {{ end }}
        {{ with .Site.Params.contact.email }}
        <a href="mailto:{{ . }}" class="about-hero__link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </a>
        {{ end }}
      </div>
    </div>
  </div>

  <div class="about-content">
    <div class="about-section">
      <form id="contact-form" class="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="{{ .Site.Params.web3formsAccessKey }}">
        <input type="hidden" name="subject" value="New message from mayurathavale.com">
        <input type="checkbox" name="botcheck" class="contact-form__honeypot" tabindex="-1" autocomplete="off">

        <div class="form-group">
          <label for="cf-name">Name</label>
          <input type="text" id="cf-name" name="name" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="cf-email">Email</label>
          <input type="email" id="cf-email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="cf-company">Company <span class="form-optional">(optional)</span></label>
          <input type="text" id="cf-company" name="company" class="form-input">
        </div>

        <div class="form-group">
          <label for="cf-message">Message</label>
          <textarea id="cf-message" name="message" class="form-input form-textarea" rows="5" required></textarea>
        </div>

        <button type="submit" class="form-submit">Send Message</button>

        <p class="form-status" id="contact-form-status" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
</section>

<script>
(function () {
  const form = document.getElementById('contact-form');
  const status = document.getElementById('contact-form-status');
  if (!form) return;

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const submitBtn = form.querySelector('.form-submit');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    status.className = 'form-status';
    status.textContent = '';

    try {
      const res = await fetch(form.action, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: new FormData(form),
      });
      const data = await res.json();
      if (data.success) {
        status.textContent = "Thanks — I'll get back to you soon.";
        status.className = 'form-status form-status--success';
        form.reset();
      } else {
        throw new Error(data.message || 'Submission failed');
      }
    } catch (err) {
      status.textContent = 'Something went wrong sending that — please email me directly instead.';
      status.className = 'form-status form-status--error';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Message';
    }
  });
})();
</script>
{{ end }}
